<!DOCTYPE html>
<!-- ==========================================================
     NEW FILE - Forgot Password Page

     Replaces the old #forgotPasswordOverlay popup that used to
     live on the Login page (index.html) with its own dedicated
     page, the same way Sign Up already gets its own page
     (signup.html) instead of being a popup on top of Login.

     Structure/head/script-tag layout is copied straight from
     signup.html so it matches the project's existing pattern
     exactly (same manifest link, same theme-color, same
     stylesheet links, same Font Awesome CDN, same common
     dependency load order). Only the body content and the
     inline page script at the bottom are new - kept inline
     instead of as a separate addedFiles/js/*.js file so this
     feature introduces only the one new file it needs.

     Flow (unchanged from the old popup - see the removed
     comment block at the top of login.js for the original
     design notes):

         Forgot Password
               |
         Enter Username
               |
         Verify Username Exists   (DataService.verifyUsernameExists)
               |
         Enter New Password / Confirm
               |
         Update Users Sheet       (DataService.resetPassword)
               |
         Password changed successfully
               |
         Back to Login (auto-redirect after ~2s)

     Reuses the exact same DataService backend calls the old
     popup used - no new backend endpoints were added.
     ========================================================== -->
<html lang="en">

<head>
    <link rel="manifest" href="../manifest.json">

    <meta name="theme-color" content="#123b8d">

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Management System - Forgot Password</title>

    <link rel="stylesheet" href="../login.css">

    <link rel="stylesheet" href="../common/common.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <!-- ===========================
         Forgot Password Container
    ============================ -->

    <div class="container">

        <div class="login-card">

            <!-- Logo -->

            <img
                id="fpLogo"
                src="../images/logo.png"
                alt="Student Management System Logo"
                class="logo">

            <!-- Title -->

            <h2 class="title" id="fpTitle">

                Forgot Password

            </h2>

            <!-- Subtitle -->

            <p class="subtitle" id="fpSubtitle">

                Enter your username

            </p>

            <!-- ===========================
                 Step 1 - Username
            ============================ -->

            <div id="fpStepUsername">

                <div class="input-box">

                    <i class="fa-regular fa-user"></i>

                    <input
                        type="text"
                        id="fpUsername"
                        placeholder="Enter Username"
                        autocomplete="username"
                        autofocus>

                </div>

                <button
                    type="button"
                    id="btnFpVerifyUsername">

                    Verify Username

                </button>

                <button
                    type="button"
                    class="signup"
                    id="btnCancelForgotPassword">

                    Cancel

                </button>

            </div>

            <!-- ===========================
                 Step 2 - New Password
            ============================ -->

            <div id="fpStepPassword" style="display:none;">

                <p class="fp-verified-line">

                    Username:
                    <strong id="fpVerifiedUsername"></strong>

                </p>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="fpNewPassword"
                        placeholder="New Password"
                        autocomplete="new-password">

                    <i
                        class="fa-regular fa-eye"
                        id="toggleFpNewPassword"></i>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="fpConfirmPassword"
                        placeholder="Confirm Password"
                        autocomplete="new-password">

                    <i
                        class="fa-regular fa-eye"
                        id="toggleFpConfirmPassword"></i>

                </div>

                <button
                    type="button"
                    id="btnFpResetPassword">

                    Reset Password

                </button>

            </div>

        </div>

    </div>

    <!-- JavaScript -->
    <!-- Common dependencies load first, same load order as index.html / signup.html -->

    <script src="../js/Config.js"></script>

    <script src="../js/StorageService.js"></script>

    <script src="../js/DataService.js"></script>

    <script src="../common/common.js"></script>

    <script src="../common/theme.js"></script>

    <script src="../common/settings.js"></script>

    <script src="../common/navigation.js"></script>

    <script src="../common/session.js"></script>

    <script src="../common/register-sw.js"></script>

    <script src="../js/LegacyCompatShim.js"></script>

    <!-- ==========================================================
         Page Script

         Kept inline (rather than adding a new addedFiles/js/*.js
         file) so this feature only introduces the one new file
         called for - this page itself. It talks to the backend
         exclusively through the existing DataService.verifyUsernameExists()
         and DataService.resetPassword() calls (the same two calls
         the old login.js popup used) - no new backend endpoints,
         no duplicated Apps Script calls. UI-flow code (step
         switching, validation, show/hide password) mirrors what
         used to live in login.js for the popup, now scoped to
         this page's own elements.
         ========================================================== -->

    <script>

        /* ==========================================================
           Get HTML Elements
           ========================================================== */

        var imgFpLogo = document.getElementById("fpLogo");

        var lblFpTitle = document.getElementById("fpTitle");
        var lblFpSubtitle = document.getElementById("fpSubtitle");

        var stepFpUsername = document.getElementById("fpStepUsername");
        var stepFpPassword = document.getElementById("fpStepPassword");

        var txtFpUsername = document.getElementById("fpUsername");
        var lblFpVerifiedUsername = document.getElementById("fpVerifiedUsername");

        var txtFpNewPassword = document.getElementById("fpNewPassword");
        var txtFpConfirmPassword = document.getElementById("fpConfirmPassword");

        var btnFpVerifyUsername = document.getElementById("btnFpVerifyUsername");
        var btnCancelForgotPassword = document.getElementById("btnCancelForgotPassword");
        var btnFpResetPassword = document.getElementById("btnFpResetPassword");

        var btnToggleFpNewPassword = document.getElementById("toggleFpNewPassword");
        var btnToggleFpConfirmPassword = document.getElementById("toggleFpConfirmPassword");

        /* Holds the username once Step 1 has confirmed it exists, so
           Step 2's Reset Password button does not have to re-read (or
           trust) the Step 1 input again - same convention the old
           popup used in login.js. */
        var strFpVerifiedUsername = "";


        /* ==========================================================
           Page Text, Application Name, and Logo

           Same approach as login.js / signup.js: comes from
           SettingsManager (which falls back to AppConfig) instead
           of being hardcoded, so a saved Application Name / Logo
           URL on the Settings page takes effect here too.
           ========================================================== */

        document.title = SettingsManager.getApplicationName() + " - Forgot Password";

        imgFpLogo.src = SettingsManager.getLogoUrl(AppConfig.DEFAULT_LOGO_URL);
        imgFpLogo.alt = SettingsManager.getApplicationName() + " Logo";

        lblFpSubtitle.textContent = "Enter your username";


        /* ==========================================================
           Register Events
           ========================================================== */

        btnFpVerifyUsername.onclick = verifyForgotPasswordUsername;

        btnCancelForgotPassword.onclick = goLogin;

        btnFpResetPassword.onclick = submitNewPassword;

        btnToggleFpNewPassword.onclick = function ()
        {
            togglePasswordVisibility(txtFpNewPassword, btnToggleFpNewPassword);
        };

        btnToggleFpConfirmPassword.onclick = function ()
        {
            togglePasswordVisibility(txtFpConfirmPassword, btnToggleFpConfirmPassword);
        };

        /* Enter key support: Step 1's field submits Step 1, Step 2's
           fields submit Step 2 - same "Enter acts like the primary
           button" convention as the Login page. */
        txtFpUsername.onkeydown = function (objEvent)
        {
            if (objEvent.key === "Enter")
            {
                verifyForgotPasswordUsername();
            }
        };

        txtFpNewPassword.onkeydown = function (objEvent)
        {
            if (objEvent.key === "Enter")
            {
                submitNewPassword();
            }
        };

        txtFpConfirmPassword.onkeydown = function (objEvent)
        {
            if (objEvent.key === "Enter")
            {
                submitNewPassword();
            }
        };


        /* ==========================================================
           Show / Hide Password

           Same show/hide behaviour as togglePassword() in login.js
           and signup.js, generalised to take the input/icon pair so
           it can serve both the New Password and Confirm Password
           fields on this page without duplicating the function body.
           ========================================================== */

        function togglePasswordVisibility(elInput, elIcon)
        {
            if (elInput.type === "password")
            {
                elInput.type = "text";

                elIcon.classList.remove("fa-eye");
                elIcon.classList.add("fa-eye-slash");
            }
            else
            {
                elInput.type = "password";

                elIcon.classList.remove("fa-eye-slash");
                elIcon.classList.add("fa-eye");
            }
        }


        /* ==========================================================
           Step 1 - Verify the Username Exists

           Asks the existing backend (Users sheet, via
           DataService.verifyUsernameExists - the same call the old
           popup used) whether this username is real before ever
           showing a New Password field. Only on a confirmed match
           does Step 2 appear.
           ========================================================== */

        function verifyForgotPasswordUsername()
        {
            var strUsername = txtFpUsername.value.trim();

            if (strUsername === "")
            {
                CommonUtils.showAlert("Please enter your username.");

                txtFpUsername.focus();

                return;
            }

            btnFpVerifyUsername.disabled = true;

            showLoader("Checking username...");

            DataService.verifyUsernameExists(strUsername, function ()
            {
                hideLoader();

                btnFpVerifyUsername.disabled = false;

                strFpVerifiedUsername = strUsername;

                lblFpVerifiedUsername.textContent = strUsername;

                lblFpTitle.textContent = "Username verified";
                lblFpSubtitle.textContent = "Choose a new password";

                stepFpUsername.style.display = "none";
                stepFpPassword.style.display = "";

                txtFpNewPassword.focus();
            },
            function (objError)
            {
                hideLoader();

                btnFpVerifyUsername.disabled = false;

                console.log(objError);

                CommonUtils.showAlert((objError && objError.message) || "Username not found.");
            });
        }


        /* ==========================================================
           Step 2 - Set the New Password

           Validates the new password / confirm password locally,
           then asks the existing backend (via DataService.resetPassword
           - the same call the old popup used) to update the Users
           sheet for the username verified in Step 1 - never the raw
           (unverified) contents of the Username field.
           ========================================================== */

        function submitNewPassword()
        {
            var strNewPassword = txtFpNewPassword.value.trim();

            var strConfirmPassword = txtFpConfirmPassword.value.trim();

            if (strNewPassword === "")
            {
                CommonUtils.showAlert("Please enter a new password.");

                txtFpNewPassword.focus();

                return;
            }

            if (strNewPassword.length < 6)
            {
                CommonUtils.showAlert("Password must be at least 6 characters.");

                txtFpNewPassword.focus();

                return;
            }

            if (strConfirmPassword === "")
            {
                CommonUtils.showAlert("Please confirm your new password.");

                txtFpConfirmPassword.focus();

                return;
            }

            if (strNewPassword !== strConfirmPassword)
            {
                CommonUtils.showAlert("Passwords do not match.");

                txtFpConfirmPassword.focus();

                return;
            }

            btnFpResetPassword.disabled = true;

            showLoader("Updating password...");

            DataService.resetPassword(strFpVerifiedUsername, strNewPassword, function ()
            {
                hideLoader();

                btnFpResetPassword.disabled = false;

                CommonUtils.showAlert("Password changed successfully.", "success");

                /* Redirect back to Login after ~2 seconds, same as
                   any other post-action success redirect in this
                   project (see the POST_REDIRECT_TOAST pattern in
                   Config.js), giving the success toast time to be
                   seen before navigating away. */
                setTimeout(goLogin, 2000);
            },
            function (objError)
            {
                hideLoader();

                btnFpResetPassword.disabled = false;

                console.log(objError);

                CommonUtils.showAlert((objError && objError.message) || "Could not update password.");
            });
        }

    </script>

</body>

</html>
