<!DOCTYPE html>
<!-- ==========================================================
     CONNECTION FIX - what changed in this pass (folder
     structure was NOT changed; only the references below)
     ==========================================================

     Every <script src="../js/application/...js"> tag on this
     page pointed one folder too deep: Config.js, StorageService.js, DataService.js and login.js actually live
     directly under www4/addedFiles/js/, not under an
     "application" sub-folder - so those tags 404'd and none of
     that code ever ran. Fixed by pointing each tag at
     ../js/...js instead, without moving a single file.

     Also added <script src="../js/DataService.js">, which did
     not exist anywhere in the project - see DataService.js for
     details.
     ========================================================== -->
<html lang="en">

<head>
    <link rel="manifest" href="../manifest.json">

    <meta name="theme-color" content="#123b8d">

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Management System - Login</title>

    <link rel="stylesheet" href="../login.css">

    <link rel="stylesheet" href="../common/common.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <!-- ===========================
         Login Container
    ============================ -->

    <div class="container">

        <div class="login-card">

            <!-- Settings Button (Phase 3): reachable before
                 login so the Server URL / App Name / Logo can
                 be configured without signing in first. -->

            <button
                type="button"
                id="btnLoginSettings"
                class="login-settings-btn"
                title="Settings">

                <i class="fa-solid fa-gear"></i>

            </button>

            <!-- Logo -->

            <img
                id="loginLogo"
                src="../images/logo.png"
                alt="Student Management System Logo"
                class="logo">

            <!-- Login Title -->

            <h2 class="title" id="loginTitle">

                Login

            </h2>

            <p class="subtitle" id="loginSubtitle">

                Welcome to Student Management System

            </p>

            <!-- Username -->

            <div class="input-box">

                <i class="fa-regular fa-user"></i>

                <input
                    type="text"
                    id="username"
                    placeholder="Enter Username"
                    autocomplete="username">

            </div>

            <!-- Password -->

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="Enter Password"
                    autocomplete="current-password">

                <i
                    class="fa-regular fa-eye"
                    id="togglePassword"></i>

            </div>

            <!-- Remember Me -->

            <div class="options">

                <label>

                    <input
                        type="checkbox"
                        id="rememberMe">

                    Remember Me

                </label>

                <a href="javascript:void(0);" id="forgotPasswordLink">
                      Forgot Password?
               </a>

            </div>

            <!-- Login Button -->

            <button
                type="button"
                id="loginBtn">

                Login

            </button>

            <!-- Sign Up Button -->

            <button
                type="button"
                class="signup"
                id="signupBtn">

                Sign Up

            </button>

        </div>

    </div>


    <!-- ===========================================
     Forgot Password Popup
=========================================== -->

<div id="forgotPasswordOverlay" class="popup-overlay" style="display:none;">

    <div class="popup-card">

        <button
            type="button"
            id="btnCloseForgotPassword"
            class="popup-close">
            ✕
        </button>

        <h2>Forgot Password</h2>

        <!-- Step 1 -->

        <div id="fpStepUsername">

            <p>Enter your username</p>

            <input
                type="text"
                id="fpUsername"
                placeholder="Username">

            <br><br>

            <button
                type="button"
                id="btnFpVerifyUsername">
                Verify Username
            </button>

            <button
                type="button"
                id="btnCancelForgotPassword">
                Cancel
            </button>

        </div>

        <!-- Step 2 -->

        <div id="fpStepPassword" style="display:none;">

            <p>

                Username:
                <strong id="fpVerifiedUsername"></strong>

            </p>

            <input
                type="password"
                id="fpNewPassword"
                placeholder="New Password">

            <br><br>

            <input
                type="password"
                id="fpConfirmPassword"
                placeholder="Confirm Password">

            <br><br>

            <button
                type="button"
                id="btnFpResetPassword">
                Reset Password
            </button>

        </div>

    </div>

</div>

    <!-- JavaScript -->
    <!-- Common dependencies load first so login.js can use Session.login() / Session.logout() -->

    <script src="../js/Config.js"></script>

    <script src="../js/StorageService.js"></script>

    <script src="../js/DataService.js"></script>

    <script src="../common/common.js"></script>

<script src="../common/theme.js"></script>

    <script src="../common/settings.js"></script>

    <script src="../common/activity.js"></script>

    <script src="../common/navigation.js"></script>

    <script src="../common/session.js"></script>

    <script src="../common/register-sw.js"></script>
    
    <script src="../js/LegacyCompatShim.js"></script>

    <script src="../js/login.js"></script>

</body>

</html>
