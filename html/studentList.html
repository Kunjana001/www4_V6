     changed.

<!-- --------------------------------------------------------
     CONNECTION FIX (mobile/desktop rendering): this page had
     no DOCTYPE and no opening html tag at all (it started
     straight at the head section), which makes browsers render
     it in "quirks mode" instead of standards mode - a common
     cause of inconsistent sizing/spacing between phone and
     desktop browsers. Added the standard, empty HTML5
     boilerplate here; nothing inside the head or body below
     was reordered or removed.
     -------------------------------------------------------- -->
<!-- ==========================================================
     CONNECTION FIX - what changed in this pass (folder
     structure was NOT changed; only the references below)
     ==========================================================

     1. Every <script src="../js/application/...">, <script
        src="../common/...">, <link href="../common/common.css">
        and <link rel="manifest" href="../manifest.json"> on
        this page pointed one folder too shallow. Config.js,
        StorageService.js, common.js, theme.js, navigation.js,
        session.js, register-sw.js, manifest.json and
        common.css actually live under www4/addedFiles/, not
        directly under www4/ - so every one of those tags 404'd
        and none of that shared code ever ran. Fixed by pointing
        each tag at ../addedFiles/... instead, without moving a
        single file.

     2. Added <script src=".../js/application/DataService.js">
        - this file did not exist anywhere in the project, so
        every DataService.* call on this page (loading the
        list, saving, deleting) threw "DataService is not
        defined" as soon as it ran. See DataService.js itself
        for the fix.

     3. Added jQuery and Bootstrap's JS bundle (matching the
        Bootstrap 4.6.2 CSS already linked above). This page's
        own script uses $(...) selectors and Bootstrap's
        .modal('show')/.modal('hide') for the Add/Edit/Filter/
        Info popups, but neither library was ever linked here.
     ========================================================== -->

<!-- ==========================================================
     UI PASS - Student List matched to Category/Section/Result
     ==========================================================

     WHY: This page had a hand-written "page-header / search-box
     / card-grid / pagination" block sitting in the HTML, but
     StudentHTML.script.js (like CategoryHTML.script.js,
     SectionHTML.script.js and ResultHTML.script.js) already
     injects its own header + search bar at runtime via
     $(".main-container").prepend(...), and Student.script.js
     only ever reads/writes #list_id, #search and #records - it
     never looked at #txtSearch, #btnSearch, #btnAddStudent,
     #btnPrevious/#btnNext or the card-grid markup at all. That
     block was dead HTML: it rendered, but no button on it did
     anything, which is why the page looked and behaved
     differently from Category/Section/Result even though all
     four share the same list-rendering code.

     WHAT CHANGED: replaced that block with the same single
     empty `<div id="list_id" class="list-container">` used on
     categoryList.html / sectionList.html / resultList.html.
     StudentHTML.script.js now prepends the identical header and
     search bar used by the other three lists, so Student List
     looks and behaves the same way. No modal, no script tag, and
     no function name below this comment was touched.

     Search button and the larger Export button were added
     inside the reusable search bar template in
     js/application/StudentHTML.script.js (studentSearchBar),
     with their click handlers added in
     js/application/Student.script.js (onListDocumentReady) -
     see the WHY/WHAT/WHEN comments in those two files.
     ========================================================== -->

   anywhere in this page - the visible "Student" header is
